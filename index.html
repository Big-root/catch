<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#ffffff" id="themeColor" />
  <title>SOOP 홈</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --label-primary-deep: #17191c;
      --label-primary:      #17191c;
      --label-secondary:    #525661;
      --label-tertiary:     #757b8a;
      --label-quaternary:   #acb0b9;
      --bg-primary:         #ffffff;
      --bg-secondary:       #f5f6f8;
      --accent:             #0182ff;
      --mid10:              rgba(145,150,161,0.1);
      --mid20:              rgba(145,150,161,0.2);
      --dark5:              rgba(23,25,28,0.05);
      --dark80:             rgba(23,25,28,0.8);
      --pink:               #ff6678;
      --live-dot:           #ff2f00;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* ── 폰 목업 ── */
    .phone-frame {
      position: relative;
      width: 399px; height: 836px;
      flex-shrink: 0;
      transition: width 0.3s ease, height 0.3s ease;
    }
    .phone-frame::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50px;
      background: linear-gradient(145deg, #2a2a2a 0%, #1a1a1a 40%, #222 100%);
      box-shadow: 0 0 0 1px #3a3a3a, 0 0 0 2px #1a1a1a,
                  0 30px 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.08);
      z-index: 0;
    }
    .phone-screen {
      position: absolute; inset: 12px;
      border-radius: 40px; overflow: hidden;
      z-index: 1; background: var(--bg-primary);
      display: flex; flex-direction: column;
      transition: inset 0.3s ease, border-radius 0.3s ease;
    }
    .btn-side-left {
      position: absolute; left: -3px; top: 120px;
      width: 4px; height: 30px;
      background: #2a2a2a; border-radius: 2px 0 0 2px;
      box-shadow: -1px 0 2px rgba(0,0,0,0.5);
    }
    .btn-side-left::before, .btn-side-left::after {
      content: ''; position: absolute; left: 0;
      width: 4px; height: 58px;
      background: #2a2a2a; border-radius: 2px 0 0 2px;
    }
    .btn-side-left::before { top: 46px; }
    .btn-side-left::after  { top: 116px; }
    .btn-side-right {
      position: absolute; right: -3px; top: 180px;
      width: 4px; height: 74px;
      background: #2a2a2a; border-radius: 0 2px 2px 0;
    }
    .phone-frame.no-frame { width: 375px; height: 812px; }
    .phone-frame.no-frame::before { display: none; }
    .phone-frame.no-frame .btn-side-left,
    .phone-frame.no-frame .btn-side-right { display: none; }
    .phone-frame.no-frame .phone-screen { inset: 0; border-radius: 12px; }

    /* ── 앱 ── */
    .home-app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: var(--bg-primary);
      overflow: hidden;
    }

    /* ── 상태바 ── */

    /* ── 네비게이션 바 ── */
    .nav-bar {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 8px;
    }
    .nav-left {
      flex: 1; display: flex; align-items: center;
    }
    .nav-center {
      display: flex; align-items: center; justify-content: center;
    }
    .nav-right {
      flex: 1; display: flex; align-items: center; justify-content: flex-end;
    }
    .nav-logo-img {
      width: 80px; height: 27px; object-fit: contain; display: block;
    }
    .nav-icon-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }

    /* ── 캡슐 탭 ── */
    .capsule-tabs {
      height: 56px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
    }
    .cap-tab {
      height: 32px;
      display: flex; align-items: center; justify-content: center;
      gap: 3px;
      padding: 0 13px;
      border-radius: 20px;
      background: var(--mid10);
      font-size: 13px; font-weight: 500;
      color: var(--label-secondary);
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .cap-tab.active {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    /* ── 텍스트 탭 ── */
    .text-tabs {
      height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 4px;
    }
    .txt-tab {
      height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 400;
      color: var(--label-tertiary);
      cursor: pointer;
      white-space: nowrap;
      padding: 0 12px;
    }
    .txt-tab.active {
      font-weight: 600;
      color: var(--label-primary-deep);
    }

    /* ── 스크롤 콘텐츠 ── */
    .scroll-content {
      flex: 1; overflow-y: auto; min-height: 0;
    }
    .scroll-content::-webkit-scrollbar { width: 0; }

    /* ── 광고 배너 섹션 ── */
    .section-banner {
      padding: 12px;
    }
    .ad-banner-card {
      width: 100%;
      border-radius: 20px;
      background: rgba(235,239,246,0.85);
      border: 1px solid rgba(23,25,28,0.05);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      gap: 12px;
    }
    .ad-banner-text { flex: 1; }
    .ad-banner-title {
      font-size: 15px; font-weight: 700; color: #17191c;
      margin-bottom: 4px;
    }
    .ad-banner-sub {
      font-size: 13px; font-weight: 400; color: #525661;
    }
    .ad-banner-img {
      width: 110px; height: 64px;
      object-fit: contain; flex-shrink: 0;
    }
    .ad-car-placeholder {
      width: 110px; height: 64px;
      background: linear-gradient(135deg, #c8cbd4, #e0e3ea);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #757b8a; font-size: 10px;
      flex-shrink: 0;
    }

    /* ── 섹션 리스트 ── */
    .section-list { padding-bottom: 12px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
      height: 48px;
    }
    .section-title {
      font-size: 18px; font-weight: 600; color: var(--label-primary-deep);
    }
    .sort-row {
      display: flex; align-items: center;
      padding: 0 12px;
      height: 40px;
      gap: 4px;
    }
    .sort-label {
      font-size: 13px; font-weight: 400; color: var(--label-tertiary);
    }
    .sort-arrow { margin-left: 2px; }

    /* ── 라이브 리스트 아이템 ── */
    .live-list { display: flex; flex-direction: column; gap: 12px; padding: 0 0 12px; }
    .live-item {
      display: flex; align-items: flex-start;
      padding: 0 12px 0 12px; gap: 0;
      cursor: pointer;
    }

    /* 썸네일 */
    .thumb-wrap {
      width: 152px; height: 89px;
      border-radius: 16px;
      overflow: hidden; flex-shrink: 0;
      position: relative;
      background: #000;
    }
    .thumb-img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .thumb-badge-left {
      position: absolute; top: 7px; left: 7px;
      display: flex; gap: 4px; align-items: center;
    }
    .badge-live {
      background: rgba(23,25,28,0.8);
      border-radius: 9px;
      height: 18px;
      padding: 0 6px;
      display: flex; align-items: center; gap: 3px;
      font-size: 12px; font-weight: 600; color: #fff;
    }
    .badge-live-dot {
      width: 5px; height: 5px;
      border-radius: 50%; background: var(--live-dot);
      flex-shrink: 0;
    }
    .badge-sub-plus {
      background: rgba(23,25,28,0.8);
      border: 1px solid var(--pink);
      border-radius: 10px;
      height: 18px; padding: 0 6px;
      display: flex; align-items: center; gap: 2px;
    }
    .badge-sub-plus-text {
      font-size: 11px; font-weight: 500;
      background: linear-gradient(92deg, #ff6678 9%, #ffb400 124%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge-sub-plus-icon {
      width: 8px; height: 8px;
      background: linear-gradient(92deg, #ff6678, #ffb400);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .badge-19 {
      position: absolute; top: 7px; right: 7px;
      width: 18px; height: 18px;
      background: rgba(239,86,95,0.9);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: #fff;
      line-height: 1;
    }

    /* 정보 영역 */
    .live-info {
      flex: 1; min-width: 0;
      padding-left: 12px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .live-nick-row {
      display: flex; align-items: center; gap: 6px;
    }
    .live-nick-profile {
      width: 20px; height: 20px;
      border-radius: 50%; object-fit: cover;
      flex-shrink: 0; background: #ccc;
    }
    .live-nick {
      font-size: 14px; font-weight: 500; color: var(--label-primary-deep);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nick-badge {
      width: 14px; height: 14px; flex-shrink: 0;
    }
    .nick-badge-sub {
      background: #e8a730; border-radius: 3px;
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; font-weight: 700; color: #fff;
    }
    .nick-badge-fan {
      background: #75aa5c; border-radius: 3px;
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; font-weight: 700; color: #fff;
    }
    .live-title {
      font-size: 15px; font-weight: 400; color: var(--label-primary-deep);
      line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .live-tags {
      display: flex; gap: 4px; align-items: center;
      padding: 2px 0;
      overflow: hidden;
    }
    .live-tag {
      height: 20px; padding: 0 8px;
      border-radius: 10px;
      font-size: 12px; font-weight: 400; color: var(--label-tertiary);
      white-space: nowrap;
    }
    .live-tag.dark { background: var(--mid20); }
    .live-tag.light { background: var(--mid10); }
    .live-more-btn {
      width: 32px; height: 23px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer;
    }
    .live-more-dots {
      display: flex; flex-direction: column; gap: 3px;
      align-items: center;
    }
    .live-more-dots span {
      width: 3px; height: 3px;
      border-radius: 50%; background: var(--label-quaternary);
      display: block;
    }

    /* ── 하단 탭바 ── */
    .bottom-tabbar {
      background: var(--bg-primary);
      border-top: 1px solid rgba(145,150,161,0.12);
      flex-shrink: 0;
    }
    .tabbar-inner { display: flex; align-items: stretch; }
    .tab-item {
      flex: 1; height: 52px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      position: relative; overflow: hidden;
      cursor: pointer; text-decoration: none;
    }
    .tab-icon {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .tab-label {
      font-size: 10px; font-weight: 500;
      color: var(--label-quaternary);
      position: absolute; bottom: 7px; white-space: nowrap;
    }
    .tab-item.active .tab-label { color: var(--label-secondary); }
    .safe-area { height: 34px; background: var(--bg-primary); flex-shrink: 0; }

    /* ── 목업 토글 ── */
    .mockup-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      display: flex; align-items: center; gap: 6px;
      background: #2a2d33; border: 1px solid #3a3e47; color: #9196a1;
      font-family: 'Pretendard', sans-serif; font-size: 12px; font-weight: 500;
      padding: 7px 13px; border-radius: 20px;
      cursor: pointer; user-select: none; outline: none;
      appearance: none; -webkit-appearance: none;
    }
    .mockup-toggle.is-on { background: #0e2a45; border-color: #0182ff; color: #0182ff; }

    @media (max-width: 500px) {
      body { padding: 0; background: #fff; }
      .phone-frame { width: 100vw; height: 100vh; background: none; }
      .phone-frame::before { display: none; }
      .phone-screen { inset: 0; border-radius: 0; }
      .btn-side-left, .btn-side-right { display: none; }
      .mockup-toggle { display: none; }
    }
  </style>
</head>

    a.addEventListener('click', e => { e.preventDefault(); openCatch(); });
  });

  document.getElementById('catch2TabBtn').addEventListener('click', e => {
    e.preventDefault();
    openCatch2();
  });

  window.addEventListener('message', e => {
    if (e.data === 'go-home')   goHome();
    if (e.data === 'go-catch')  openCatch();
    if (e.data === 'go-catch2') openCatch2();
  });

  /* ── 목업 토글 ── */
  const frame = document.getElementById('phoneFrame');
  const toggleBtn = document.getElementById('mockupToggle');
  const toggleSpan = toggleBtn.querySelector('span');
  toggleBtn.addEventListener('click', () => {
    const isOn = frame.classList.toggle('no-frame');
    toggleBtn.classList.toggle('is-on', !isOn);
    toggleSpan.textContent = isOn ? '목업 OFF' : '목업 ON';
  });
</script>
</body>
</html>
